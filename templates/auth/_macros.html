{% macro password_field(field, placeholder='', autocomplete='current-password') %}
<div class="form-input-wrap">
  {{ field(class="form-input form-input--password", autocomplete=autocomplete, placeholder=placeholder) }}
  <button
    type="button"
    class="form-input-toggle"
    aria-label="{{ _('auth.show_password') }}"
    aria-pressed="false"
    title="{{ _('auth.show_password') }}"
  >
    <svg class="form-input-toggle__icon form-input-toggle__icon--show" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
      <path fill="currentColor" d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10zm0-2.5a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/>
    </svg>
    <svg class="form-input-toggle__icon form-input-toggle__icon--hide" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
      <path fill="currentColor" d="M3.3 2.5 2 3.8l2.1 2.1C2.6 7.9 1 12 1 12s3 7 11 7c2.1 0 3.9-.6 5.4-1.5l2.3 2.3 1.3-1.3L3.3 2.5zM12 17c-4.2 0-7.2-3.5-8.5-5.2l1.9-1.9A10.8 10.8 0 0 0 12 17zm0-10c4.2 0 7.2 3.5 8.5 5.2l-1.2 1.2A8.5 8.5 0 0 0 12 7zm-2.8 2.8 6 6A2.5 2.5 0 0 1 9.2 9.8zM14.8 14.2l-6-6A2.5 2.5 0 0 1 14.8 14.2z"/>
    </svg>
  </button>
</div>
{% endmacro %}
